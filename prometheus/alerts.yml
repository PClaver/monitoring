groups:
  - name: containers
    rules:
      - alert: ContainerDown
        expr: |
          absent(container_last_seen{container_label_com_docker_compose_project="sa_deals_2"})
          or absent(container_last_seen{container_label_com_docker_compose_project="pmgpc"})
          or absent(container_last_seen{container_label_com_docker_compose_project="oshun"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Project {{ $labels.container_label_com_docker_compose_project }} is down"
          description: "No containers seen for project {{ $labels.container_label_com_docker_compose_project }} in over 1 minute."

      - alert: ContainerHighCPU
        expr: |
          sum by(container_label_com_docker_compose_project) (
            rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_project=~"sa_deals_2|pmgpc|oshun"}[5m])
          ) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.container_label_com_docker_compose_project }}"
          description: "{{ $labels.container_label_com_docker_compose_project }} is using more than 0.8 CPU cores for 5 minutes."

      - alert: ContainerHighMemory
        expr: |
          sum by(container_label_com_docker_compose_project) (
            container_memory_working_set_bytes{container_label_com_docker_compose_project=~"sa_deals_2|pmgpc|oshun"}
          ) > 500 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.container_label_com_docker_compose_project }}"
          description: "{{ $labels.container_label_com_docker_compose_project }} memory is above 500MB for 5 minutes."

      - alert: ContainerRestarting
        expr: |
          increase(container_start_time_seconds{container_label_com_docker_compose_project=~"sa_deals_2|pmgpc|oshun"}[30m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.container_label_com_docker_compose_project }} restarting frequently"
          description: "A container in {{ $labels.container_label_com_docker_compose_project }} has restarted more than twice in 30 minutes."

  - name: host
    rules:
      - alert: HostHighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on host"
          description: "Host CPU usage is above 85% for 5 minutes."

      - alert: HostHighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on host"
          description: "Host memory usage is above 85% for 5 minutes."

      - alert: HostDiskRunningFull
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"}
          / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk running low"
          description: "Host disk has less than 15% free space."

  - name: nginx
    rules:
      - alert: NginxHighErrorRate
        expr: |
          sum(rate(nginx_http_requests_total{status=~"5.."}[5m]))
          / sum(rate(nginx_http_requests_total[5m])) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High nginx 5xx error rate"
          description: "More than 5% of requests are returning 5xx errors."
