# -------------------------------------------------------
# Copy this file into your gateway project's conf.d/ folder
# It does two things:
#   1. Defines a log format that includes request_time
#      (needed for response time metrics in Grafana)
#   2. Exposes /stub_status on an internal port for
#      nginx-prometheus-exporter (never exposed to the host)
# -------------------------------------------------------

# Custom log format with request time
log_format monitoring '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      '$request_time';

# Internal metrics endpoint - accessible only within proxy_net
server {
    listen 8080;
    server_name _;
    access_log off;

    location /stub_status {
        stub_status;
    }

    location / {
        return 404;
    }
}
