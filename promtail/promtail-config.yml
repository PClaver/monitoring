server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: logstream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
    pipeline_stages:
      - docker: {}

      # Parse nginx access logs for request time and status
      - match:
          selector: '{container="gateway"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>\S+) - \S+ \[[^\]]+\] "(?P<method>\S+) (?P<path>\S+)[^"]*" (?P<status>\d+) \d+ "[^"]*" "[^"]*"( (?P<request_time>[\d.]+))?'
            - labels:
                method:
                status:
            - template:
                source: path
                # strip query strings to avoid high cardinality
                template: '{{ regexReplaceAll "\\?.*" .Value "" }}'
            - labels:
                path:
