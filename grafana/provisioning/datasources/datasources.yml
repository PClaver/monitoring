apiVersion: 1

datasources:
  - name: Prometheus - Server 1
    type: prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    url: http://loki:3100

# -------------------------------------------------------
# When you add a second server, add its Prometheus here.
# Grafana dashboards can then use a $datasource variable
# to switch between servers.
